services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laract-quiz-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    environment:
      APP_ENV: production
      APP_DEBUG: false
      APP_URL: http://localhost:${APP_PORT:-8000}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: laract_quiz
      DB_USERNAME: laract
      DB_PASSWORD: secret
      CACHE_STORE: database
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - storage:/var/www/html/storage/app

  mysql:
    image: mysql:8.0
    container_name: laract-quiz-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laract_quiz
      MYSQL_USER: laract
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root_secret
    ports:
      - "${DB_EXPOSE_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "laract", "-psecret"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  storage:
